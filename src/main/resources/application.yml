spring:
  application:
    name: sy-ai-agent
  profiles:
    active: local

  datasource:
    # 数据库连接（敏感信息请使用环境变量或 application-local.yml，勿提交到 Git）
    url: ${DB_URL:jdbc:postgresql://localhost:5432/your_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-plus
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:1b

    # MCP 客户端：启用后会在启动时连接/拉起 MCP 服务，若服务未就绪会导致启动超时失败。
  # 需要时取消注释，并先确保：SSE 模式已启动 sy-image-search-mcp（端口 8127）；或 stdio 模式已构建 jar 且 amap 需 npx。
#  mcp:
#    client:
#      sse:
#        connections:
#          server1:
#            url: http://localhost:8127
#      stdio:
#        servers-configuration: classpath:mcp-servers.json

server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "default"
      paths-to-match: "/**"
      packages-to-scan: com.seewhy.syaiagent.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# searchAPI（敏感信息请使用环境变量或 application-local.yml）
search-api:
  api-key: ${SEARCH_API_KEY:}

# Pexels 图片搜索（SyManus 搜索/下载图片用）
pexels:
  api-key: ${PEXELS_API_KEY:}
# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG
