spring:
  application:
    name: sy-ai-agent
  profiles:
    active: local

  datasource:
    # 数据库连接（敏感信息请使用环境变量或 application-local.yml，勿提交到 Git）
    url: ${DB_URL:jdbc:postgresql://localhost:5432/your_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-plus
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:1b

#  #需要启动 MCP 服务
#    mcp:
#      client:
#        sse:
#          connections:
#            server1:
#              url: http://localhost:8127
#        stdio:
#          servers-configuration: classpath:mcp-servers.json

server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "default"
      paths-to-match: "/**"
      packages-to-scan: com.sy.syaiagent.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# searchAPI（敏感信息请使用环境变量或 application-local.yml）
search-api:
  api-key: ${SEARCH_API_KEY:}
# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG
